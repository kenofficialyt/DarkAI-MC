# AI Server Assistant - Messages (English)

# Help Messages
help.header==== AI Server Assistant Help ===
help.description=AI-powered server assistant
help.fix=/ai fix <issue> - Analyze and suggest server fix
help.scan=/ai scan <player> - Scan player for cheating
help.build=/ai build <description> - Build structure from description
help.item=/ai item <spec> - Create custom item
help.trade=/ai trade <spec> - Create villager trade
help.scanplugins=/ai scan-plugins - Scan plugins for threats
help.reload=/ai reload - Reload configuration

# General Messages
prefix=&b[AI] &r
reloaded=&aConfiguration reloaded successfully!
unknown-command=&cUnknown command. Use /ai help

# Error Messages
error.no-permission=&cYou don't have permission to use this command.
error.player-not-found=&cPlayer not found: {player}
error.ai-failure=&cAI request failed: {error}
error.rate-limit=&cRate limit exceeded. Wait {seconds} seconds.
error.feature-disabled=&cThis feature is disabled in config.
error.invalid-arguments=&cInvalid arguments. Use /ai help

# Success Messages
success.fix=&aAnalysis complete: {result}
success.scan=&aScan complete for {player}: {result}
success.build=&aBuilding generated: {result}
success.item=&aItem created: {result}
success.trade=&aTrade created: {result}
success.scanplugins=&aPlugin scan complete: {result}

# Anti-Cheat Messages
anticheat.suspicious=&e[Anti-Cheat] Suspicious activity detected: {player}
anticheat.kick=&cYou have been flagged for suspicious behavior.
anticheat.violation=&e{player} - {type}: {details}

# Translation
translation.loaded=&aLoaded language: {lang}
translation.not-found=&cLanguage not found: {lang}, using default

# Building
building.start=&aBuilding structure...
building.complete=&aStructure complete!
building.progress=&aBuilding: {percent}%

# Virus Scanner
scanner.scanning=&eScanning plugin: {plugin}
scanner.threat=&cTHREAT DETECTED: {type} in {plugin}
scanner.clean=&a{plugin} - No threats found
scanner.complete=&aScan complete. Threats: {count}

# Item Creator
item.created=&aCustom item created: {name}
item.saved=&aSaved to data/custom-items.yml
item.error=&cFailed to create item: {error}

# Trade Creator
trade.created=&aVillager trade created: {trade}
trade.saved=&aSaved to data/custom-trades.yml
trade.error=&cFailed to create trade: {error}

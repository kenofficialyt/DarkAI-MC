# AI Server Assistant - Messages (Vietnamese)

# Help Messages
help.header==== Tro AI Server Assistant ===
help.description=Tro AI cho server Minecraft
help.fix=/ai fix <van-de> - Phan tich va de xuat sua loi server
help.scan=/ai scan <nguoi-choi> - Quet nguoi choi cheating
help.build=/ai build <mo-ta> - Xay dung cau truc theo mo ta
help.item=/ai item <thong-so> - Tao item tuy chinh
help.trade=/ai trade <thong-so> - Tao giao dich danh cho
help.scanplugins=/ai scan-plugins - Quet plugin co virus
help.reload=/ai reload - Tai lai cau hinh

# General Messages
prefix=&b[AI] &r
reloaded=&aCau hinh da duoc tai lai thanh cong!
unknown-command=&cLenh khong hop le. Su dung /ai help

# Error Messages
error.no-permission=&cBan khong co quyen su dung lenh nay.
error.player-not-found=&cKhong tim thay nguoi choi: {player}
error.ai-failure=&cYeu cau AI that bai: {error}
error.rate-limit=&cVuot qua gioi han. Cho {seconds} giay.
error.feature-disabled=&cTinh nang nay bi tat trong cau hinh.
error.invalid-arguments=&cDoi so khong hop le. Su dung /ai help

# Success Messages
success.fix=&aPhan tich hoan tat: {result}
success.scan=&aQuet hoan tat cho {player}: {result}
success.build=&aCau truc da tao: {result}
success.item=&aItem da tao: {result}
success.trade=&aGiao dich da tao: {result}
success.scanplugins=&aQuet plugin hoan tat: {result}

# Anti-Cheat Messages
anticheat.suspicious=&e[Anti-Cheat] Phat hien hoat dong bat thuong: {player}
anticheat.kick=&cBan bi danh dau vi hanh vi bat thuong.
anticheat.violation=&e{player} - {type}: {details}

# Translation
translation.loaded=&aDa tai ngon ngu: {lang}

ai:
  provider: "openai"
  
  # OpenAI (GPT-4)
  openai-key: "YOUR_OPENAI_KEY_HERE"
  
  # Anthropic (Claude)
  anthropic-key: "YOUR_ANTHROPIC_KEY_HERE"
  
  # Google Gemini
  gemini-key: "YOUR_GEMINI_KEY_HERE"
  
  # Codeium
  codeium-key: "YOUR_CODEIUM_KEY_HERE"
  
  # GitHub Copilot
  copilot-key: "YOUR_COPILOT_KEY_HERE"
  copilot-url: "https://api.github.com"
  
  # Custom OpenAI Compatible API
  api-key: "YOUR_API_KEY_HERE"
  base-url: "https://api.openai.com/v1"
  
  # Ollama (Local)
  ollama-url: "http://localhost:11434"
  
  model: "gpt-4"
  max-tokens: 2000
  temperature: 0.7

features:
  server-fixer: true
  anti-cheat: true
  building: true
  item-creator: true
  virus-scanner: true
  config-editor: true

limits:
  requests-per-minute: 10
  auto-save-interval: 300

anticheat:
  enabled: true
  log-suspicious: true
  alert-threshold: 3
  ban-threshold: 3
  
  detection:
    movement: true
    combat: true
    misc: true
    advanced: true

language: "en"
